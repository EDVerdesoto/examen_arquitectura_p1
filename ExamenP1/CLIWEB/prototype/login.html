<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TicketPremium (Wireframe)</title>
<style>
:root {
  --grad-start: #0f4c5c;
  --grad-end: #1a759f;
  --accent: #00b4d8;
  --bg: #0d1b2a;
  --surface: #1b2838;
  --surface2: #243447;
  --fg: #e0e6ed;
  --muted: #8899aa;
  --border: #2d3f50;
  --danger: #e5534b;
  --radius: 12px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background-image: 
    linear-gradient(180deg, rgba(13,27,42,0.9) 0%, rgba(13,27,42,0.82) 100%),
    url('../wwwroot/images/f54dc119-3371-4f3d-8f11-006445168f44.jpg');
  background-size: cover;
  background-position: center;
}
.login-wrapper {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}
.brand {
  text-align: center;
  margin-bottom: 32px;
}
.brand-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
  border-radius: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 12px;
}
.brand h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
.brand p  { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
}
.card h2 {
  font-size: 1.25rem;
  margin-bottom: 24px;
  text-align: center;
  font-weight: 600;
}
.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 6px;
}
.field input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--fg);
  font-size: 0.95rem;
  transition: border-color 0.2s;
  outline: none;
}
.field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,180,216,0.15); }
.field input::placeholder { color: var(--muted); }
.btn {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: filter 0.15s, transform 0.1s;
}
.btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.error-msg {
  background: rgba(229,83,75,0.12);
  border: 1px solid rgba(229,83,75,0.3);
  color: var(--danger);
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.85rem;
  margin-bottom: 16px;
}
.wf-note {
  text-align: center;
  color: var(--muted);
  font-size: 0.72rem;
  margin-top: 24px;
}
.wf-badge {
  display: inline-block;
  padding: 4px 10px;
  border: 1px dashed var(--border);
  border-radius: 4px;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-top: 16px;
}
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="brand">
    <div class="brand-icon">&#9917;</div>
    <h1>TicketPremium</h1>
    <p>Compra tus boletos para los mejores partidos</p>
  </div>
  <div class="card">
    <h2>Iniciar sesión</h2>
    <!-- [WF] Error state: muestra mensaje de credenciales inválidas o error de conexión -->
    <div class="field">
      <label for="user">Usuario</label>
      <input id="user" type="text" placeholder="Nombre de usuario" value="admin">
    </div>
    <div class="field">
      <label for="pass">Clave</label>
      <input id="pass" type="password" placeholder="Contraseña" value="••••••••">
    </div>
    <button class="btn" onclick="location.href='partidos.html'">Ingresar →</button>
  </div>
  <div class="wf-note">
    <span class="wf-badge">Wireframe — Login</span>
    <br>Ruta: /login · Layout: EmptyLayout (sin navbar)
  </div>
</div>
</body>
</html>
